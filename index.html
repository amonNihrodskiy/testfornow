<style>
  *{ box-sizing:border-box; margin:0; padding:0; user-select:none; -webkit-tap-highlight-color:transparent; font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  body{
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(180deg,#bfe9ff 0%,#ffe6f3 50%,#fff7d6 100%);
  }

  .deck{ position:relative; width:min(420px, 88vw); height: 65vh; max-height: 520px; margin-top: 10px; }

  .card{
    position:absolute; left:50%; top:50%; width:100%; height: 100%;
    transform: translate(-50%,-50%);
    background: #ffffff; /* Белый непрозрачный фон */
    border-radius:22px; padding:14px;
    border:1px solid rgba(0,0,0,0.06);
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
    display:flex; flex-direction:column; gap:12px;
    touch-action:none; will-change: transform;
  }

  .photo{
    flex: 1;
    min-height: 0; 
    border-radius:16px;
    background:
      radial-gradient(circle at 25% 20%, rgba(255, 90, 160, 0.22), rgba(255,255,255,0)),
      radial-gradient(circle at 75% 22%, rgba(255, 184, 77, 0.22), rgba(255,255,255,0)),
      linear-gradient(180deg, rgba(191,233,255,0.55), rgba(255,230,243,0.65));
    border:1px solid rgba(0,0,0,0.05);
    display:flex; align-items:center; justify-content:center; 
    font-size: clamp(40px, 12vh, 70px);
  }

  .text{
    min-height: 60px; display:flex; align-items:center; justify-content:center;
    text-align:center; font-weight:900; font-size: clamp(15px, 4vw, 18px); line-height:1.35;
    color:#2b1b2a; padding:0 8px;
  }

  .caption{ text-align:center; font-size:13px; font-weight:800; color: rgba(43,27,42,0.55); padding-bottom:6px; }

  /* --- ИСПРАВЛЕНО: ТЕПЕРЬ ЗАДНИЕ КАРТОЧКИ ПОЛНОСТЬЮ ВИДИМЫ (OPACITY 1) --- */
  .card.back1{ transform: translate(-50%,-50%) translate(8px, 10px) rotate(2deg) scale(0.98); opacity: 1; z-index: 99; }
  .card.back2{ transform: translate(-50%,-50%) translate(-8px, 16px) rotate(-2deg) scale(0.96); opacity: 1; z-index: 98; }

  .title{
    position:fixed; top: clamp(20px, 4vh, 40px); left:50%; transform:translateX(-50%);
    font-size: clamp(18px, 5vw, 26px); font-weight:900; color:#2b1b2a;
    text-align:center; background:rgba(255,255,255,0.85);
    padding:10px 20px; border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08); white-space: nowrap; z-index: 100;
  }

  .flower{ position:fixed; top:-20px; font-size:18px; pointer-events:none; animation:fall linear forwards; z-index: 1; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(360deg); opacity:0; } }

  .card.special {
    background: linear-gradient(135deg, #fffcf0 0%, #ffffff 100%);
    border: 2px solid #ffcc00; box-shadow: 0 15px 45px rgba(255, 204, 0, 0.35), 0 0 15px rgba(255, 204, 0, 0.4);
  }
  .card.special .photo {
    background:
      radial-gradient(circle at 30% 25%, rgba(255, 204, 0, 0.4), rgba(255,255,255,0)),
      radial-gradient(circle at 70% 30%, rgba(255, 90, 160, 0.3), rgba(255,255,255,0)),
      linear-gradient(180deg, #fffae6, #ffe6f3);
    border: 1px solid rgba(255, 204, 0, 0.3);
  }
  .card.special .text { color: #d62828; }
  .card.special .caption { color: #d62828; font-weight:900; }

  .super-badge {
    position: absolute; top: -12px; right: -8px;
    background: linear-gradient(135deg, #ff5e62, #ff9966); color: white;
    padding: 6px 12px; border-radius: 20px; font-weight: 900; font-size: 13px;
    box-shadow: 0 4px 12px rgba(255, 94, 98, 0.5); transform: rotate(5deg);
    animation: pulseBadge 1.5s infinite; z-index: 10;
  }
  @keyframes pulseBadge { 0%, 100% { transform: rotate(5deg) scale(1); } 50% { transform: rotate(5deg) scale(1.1); } }

  .bottom-bar {
    position: fixed; bottom: clamp(20px, 4vh, 30px); left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 1000; align-items: center; width: 92vw; max-width: 400px;
    justify-content: space-between;
  }

  .score-board {
    background: rgba(255, 255, 255, 0.95); padding: 10px 16px;
    border-radius: 30px; font-size: clamp(14px, 4vw, 16px); font-weight: 800; color: #2b1b2a;
    box-shadow: 0 8px 25px rgba(255, 90, 160, 0.25);
    display: flex; align-items: center; justify-content: center; gap: 6px; 
    transition: transform 0.15s; flex: 1; white-space: nowrap;
  }
  .score-board.pop { transform: scale(1.08); }

  .wallet-btn {
    background: linear-gradient(135deg, #ff8da1, #ff3385); flex-shrink: 0;
    width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: white; border: none; box-shadow: 0 8px 20px rgba(255, 51, 133, 0.4); cursor: pointer;
    transition: transform 0.2s; position: relative;
  }
  .wallet-btn:active { transform: scale(0.9); }
  .wallet-badge {
    position: absolute; top: -5px; right: -5px; background: white; color: #ff3385;
    font-size: 11px; font-weight: 900; padding: 2px 6px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  .restart-btn {
    position: fixed; bottom: clamp(80px, 12vh, 100px); left: 50%; transform: translateX(-50%) scale(0.8);
    background: rgba(255, 255, 255, 0.9); border: 2px solid #ff8da1; color: #ff3385;
    padding: 10px 24px; border-radius: 25px; font-weight: 800; font-size: 15px;
    cursor: pointer; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 100; box-shadow: 0 4px 15px rgba(255, 51, 133, 0.2); white-space: nowrap;
  }
  .restart-btn.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
  .restart-btn:active { transform: translateX(-50%) scale(0.95); }

  .overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(30, 15, 25, 0.85); 
    z-index: 99999; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease; will-change: opacity;
  }
  .overlay.active { opacity: 1; pointer-events: auto; }

  .prize-card {
    background: linear-gradient(135deg, #fff9e6 0%, #fff 100%);
    width: min(360px, 90vw); padding: 24px 20px; border-radius: 20px;
    text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4); border: 2px solid #ffb84d; 
    transform: scale(0.85); opacity: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    display: flex; flex-direction: column; gap: 12px; will-change: transform, opacity;
  }
  .overlay.active .prize-card { transform: scale(1); opacity: 1; }

  .prize-icon { font-size: 55px; line-height: 1; animation: float 3s ease-in-out infinite; }
  .prize-title { font-size: 22px; font-weight: 900; color: #ff3385; text-transform: uppercase; }
  .prize-desc { font-size: 15px; font-weight: 600; color: #5a4b59; line-height: 1.4; min-height: 44px;}
  .prize-note { font-size: 12px; font-weight: 700; color: #ff8da1; }
  
  .btn {
    margin-top: 10px; border: none; padding: 14px 24px; font-size: 16px; font-weight: 800; border-radius: 30px; cursor: pointer; transition: transform 0.2s;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: linear-gradient(90deg, #ff3385, #ff8da1); color: white; box-shadow: 0 8px 20px rgba(255, 51, 133, 0.4); }
  .btn-secondary { background: #f0e6f2; color: #5a4b59; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  .wallet-modal {
    background: #fff; width: min(400px, 95vw); max-height: 85vh; border-radius: 24px; padding: 20px;
    display: flex; flex-direction: column; gap: 15px; transform: scale(0.9); opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s; will-change: transform, opacity;
  }
  .overlay.active .wallet-modal { transform: scale(1); opacity: 1; }
  
  .wallet-header { display: flex; justify-content: space-between; align-items: center; }
  .wallet-title { font-size: 20px; font-weight: 900; color: #2b1b2a; }
  .close-btn { background: none; border: none; font-size: 32px; line-height: 1; font-weight: bold; color: #ccc; cursor: pointer; padding: 0 5px; margin-top: -5px;}
  
  .coupons-list {
    display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    padding-right: 5px; margin-bottom: 5px; -webkit-overflow-scrolling: touch; 
  }
  .coupons-list::-webkit-scrollbar { width: 6px; }
  .coupons-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
  .coupons-list::-webkit-scrollbar-thumb { background: #ff8da1; border-radius: 10px; }

  .coupon-item { background: #fdf2f8; border: 2px dashed #ffb8d2; padding: 12px; border-radius: 14px; display: flex; gap: 12px; align-items: center; }
  .coupon-item.locked { background: #f5f5f5; border: 2px dashed #e0e0e0; filter: grayscale(1); opacity: 0.7; }
  .c-icon { font-size: 26px; }
  .c-info { display: flex; flex-direction: column; text-align: left; }
  .c-name { font-weight: 800; font-size: 14px; color: #2b1b2a; }
  .coupon-item.locked .c-name { color: #888; }
  .c-desc { font-size: 12px; font-weight: 600; color: #777; margin-top: 2px; line-height: 1.2;}

</style>
</head>

  }

  function heartBurst(x,y, amount=12, spread=55, symbol="❤️"){
    for(let i=0;i<amount;i++){
      const h=document.createElement("div");
      h.textContent= symbol;
      h.style.position="fixed"; h.style.left=x+"px"; h.style.top=y+"px";
      h.style.fontSize=(16+Math.random()*15)+"px";
      h.style.pointerEvents="none"; h.style.zIndex="999999";
      const angle=Math.random()*Math.PI*2;
      const dist= 40 + Math.random()*spread;
      h.animate([
        { transform:"translate(-50%, -50%) scale(1)", opacity:1 },
        { transform:`translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0.6)`, opacity:0 }
      ],{duration: 800 + Math.random()*400, easing:"ease-out"});
      document.body.appendChild(h);
      setTimeout(()=>h.remove(), 1200);
    }
  }

    } else {
      btn.innerText = "Ура!";
      btn.className = "btn btn-primary";
    }

  }

    const unownedCoupons = ALL_COUPONS.filter(c => !unlockedCoupons.includes(c.id));
    const ownedCoupons = ALL_COUPONS.filter(c => unlockedCoupons.includes(c.id));
    
    let randomCoupon;
    if (unownedCoupons.length > 0 && Math.random() < 0.85) {
        randomCoupon = rand(unownedCoupons);
    } else if (ownedCoupons.length > 0) {
        randomCoupon = rand(ownedCoupons);
    } else {
        randomCoupon = rand(unownedCoupons); 
    }

    const isDuplicate = unlockedCoupons.includes(randomCoupon.id);

    if (isDuplicate) {
      showPrizeModal("😅", "Дубликат...", `Тебе выпал "${randomCoupon.title}", но он у тебя уже есть!`, "Свайпай дальше, чтобы найти оставшиеся купоны!", true);
    } else {
      unlockedCoupons.push(randomCoupon.id);
      saveCoupons();
      showPrizeModal(randomCoupon.icon, "Новый Купон!", `<b>${randomCoupon.title}</b><br><br>${randomCoupon.desc}`, "Сохранено в твой кошелек 💌", false);
    }
  }

  function claimPrize() {
    const btnRect = document.getElementById('pBtn').getBoundingClientRect();
    heartBurst(btnRect.left + btnRect.width/2, btnRect.top + btnRect.height/2, 40, 300, "💖");

    prizeOverlay.classList.remove("active");
    score = 0; 
    isPrizeTriggered = false; 

    if (pendingFinal) {
        pendingFinal = false;
        isInfiniteMode = true;
        localStorage.setItem('8march_final', 'true');
        restartBtn.classList.add('show');
    }

    updateScoreUI();
  }

  function renderWalletHTML() {
    const list = document.getElementById('couponsList');
    list.innerHTML = ""; 
    ALL_COUPONS.forEach(c => {
      const isUnlocked = unlockedCoupons.includes(c.id);
      const item = document.createElement('div');
      item.className = `coupon-item ${isUnlocked ? '' : 'locked'}`;
      item.innerHTML = `
        <div class="c-icon">${isUnlocked ? c.icon : '🔒'}</div>
        <div class="c-info">
          <div class="c-name">${c.title}</div>
          <div class="c-desc">${isUnlocked ? c.desc : 'Свайпай, чтобы открыть этот купон...'}</div>
        </div>
      `;
      list.appendChild(item);
    });
  }

  function openWallet() {
    renderWalletHTML();
    requestAnimationFrame(() => {
      walletOverlay.classList.add('active');
    });
  }

  function closeWallet() {
    walletOverlay.classList.remove('active');
  }

  function hardReset() {
    if(confirm("Точно хочешь удалить все собранные купоны и начать игру заново?")) {
      unlockedCoupons = [];
      localStorage.removeItem('8march_coupons');
      localStorage.removeItem('8march_final');
      saveCoupons();
      score = 0;
      isInfiniteMode = false;
      pendingFinal = false;
      restartBtn.classList.remove('show');
      updateScoreUI();
    }
  }

  function createCard(isTop){
    const el = document.createElement('div');
    el.className = 'card';
    dealtCount++;

    const isSpecial = (dealtCount % 7 === 0);
    
    const text  = isSpecial ? rand(specialCards) : rand(cards);
    const emoji = isSpecial ? rand(specialEmojis) : rand(emojis);
    const cap   = isSpecial ? rand(specialCaptions) : rand(captions);

    if (isSpecial) el.classList.add("special");

    const badgeHTML = isSpecial ? `<div class="super-badge">🌟 Особая (+3)</div>` : '';

    el.innerHTML = `
      ${badgeHTML}
      <div class="photo">${emoji}</div>
      <div class="text">${text}</div>
      <div class="caption">${cap}</div>
    `;

    el.style.transition = isTop ? 'none' : 'transform 220ms ease, opacity 220ms ease';
    deck.appendChild(el);
    return el;
  }

  function layout(){
    for (let i=0;i<stackEls.length;i++){
      const el = stackEls[i];
      el.classList.remove('back1','back2');
      el.style.zIndex = String(100 - i);
      if (i === 1) el.classList.add('back1');
      if (i === 2) el.classList.add('back2');
    }
  }

  function ensureStack(){
    while (stackEls.length < STACK_SIZE) stackEls.push(createCard(stackEls.length === 0));
    layout(); attachTopHandlers();
  }

  let pulling = false, startX = 0, startY = 0, dx = 0, dy = 0, moved = false, pid = null;

  function attachTopHandlers(){
    stackEls.forEach(el => { el.onpointerdown=null; el.onpointermove=null; el.onpointerup=null; el.onpointercancel=null; });
    const top = stackEls[0]; if (!top) return;

    top.onpointerdown = (e) => {
      if(isPrizeTriggered || prizeOverlay.classList.contains('active') || walletOverlay.classList.contains('active')) return;

      pulling = true; moved = false; pid = e.pointerId;
      top.setPointerCapture(pid);
      startX = e.clientX; startY = e.clientY; dx = 0; dy = 0;
      top.style.transition = 'none';
    };

    top.onpointermove = (e) => {
      if (!pulling || e.pointerId !== pid) return;
      dx = e.clientX - startX; dy = e.clientY - startY;
      if (Math.abs(dx) + Math.abs(dy) > 6) moved = true;
      top.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${dx * 0.06}deg)`;
    };

    top.onpointerup = (e) => {
      if (!pulling || e.pointerId !== pid) return;
      pulling = false;
      const shouldSwipe = moved && (Math.abs(dx) > 90);
      top.style.transition = 'transform 220ms cubic-bezier(.2,.8,.2,1), opacity 180ms ease';

      if (shouldSwipe) swipeOut(top, dx > 0 ? 1 : -1);
      else {
        top.style.transform = 'translate(-50%,-50%)';
        setTimeout(()=>{ top.style.transition = 'transform 220ms ease, opacity 220ms ease'; }, 0);
      }
    };

    top.onpointercancel = () => {
      pulling = false; top.style.transition = 'transform 220ms ease'; top.style.transform = 'translate(-50%,-50%)';
    };
  }

  function updateScoreUI() {
    if (isInfiniteMode) {
        scoreText.innerHTML = `${score} / &infin;`;
    } else {
        scoreText.innerText = `${Math.min(score, GOAL)} / ${GOAL}`;
    }
    
    scoreBoard.classList.remove('pop'); 
    void scoreBoard.offsetWidth; 
    scoreBoard.classList.add('pop');
  }

  function swipeOut(el, dir){
    const offX = dir * (window.innerWidth * 0.9);
    const rot = dir * 18;
    const isSpecial = el.classList.contains("special");
    
    heartBurst(window.innerWidth/2, window.innerHeight/2, isSpecial ? 22 : 12);
    
    score += isSpecial ? 3 : 1;
    updateScoreUI();

    if (!isInfiniteMode && score >= GOAL && !isPrizeTriggered) {
      isPrizeTriggered = true; 
      setTimeout(triggerSuperPrize, 300);
    }

    el.style.opacity = '0';
    el.style.transform = `translate(calc(-50% + ${offX}px), calc(-50% + ${dy}px)) rotate(${rot}deg)`;

    setTimeout(() => {
      el.remove(); stackEls.shift(); stackEls.push(createCard(false));
      const newTop = stackEls[0];
      if (newTop){
        newTop.style.transition = 'none'; newTop.style.transform = 'translate(-50%,-50%)';
        requestAnimationFrame(()=> newTop.style.transition = 'transform 220ms ease, opacity 220ms ease');
      }
      layout(); attachTopHandlers(); dx = 0; dy = 0;
    }, 200);
  }

  window.onload = () => {
      if (isInfiniteMode) {
          restartBtn.classList.add('show');
          updateScoreUI();
      }
  };

  ensureStack();
</script>
</body>
</html>
